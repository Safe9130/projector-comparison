<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="utf-8">
<meta content="width=device-width,initial-scale=1" name="viewport">
<title>Kyleの投影機規格比較 v3.1</title>
<style>
:root{
  color-scheme: light dark;
}
:root[data-theme="light"]{
  --bg:#f5f7fb;
  --surface:#fff;
  --surface-2:#eff3f8;
  --text:#0e1621;
  --muted:#5c708a;
  --accent:#2eaadc;
  --good:#44d17a;
  --danger:#ef4444;
  --warning:#f59e0b;
  --border:rgba(16,24,40,.1);
  --shadow:0 6px 18px rgba(16,24,40,.08);
  --radius:16px;
}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Noto Sans,Arial;}
.container{max-width:1400px;margin:20px auto;padding:0 16px;}
header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
h1{margin:0;font-size:26px}
.sub{color:var(--muted)}
.grid{display:grid;grid-template-columns:280px 1fr;gap:16px;}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card h2{margin:0;padding:14px 16px;border-bottom:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:space-between;}
.card .content{padding:14px 16px;}
.row{display:flex;align-items:center;flex-wrap:wrap;gap:10px;}
select,input{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;width:100%;}
.btn{background:var(--accent);color:#04222c;border:none;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:600;box-shadow:0 4px 10px rgba(46,170,220,.35);transition:all 0.2s;white-space:nowrap;}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(46,170,220,.45);}
.btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);box-shadow:none;}
.btn.secondary:hover{background:var(--surface);border-color:var(--accent);}
.btn.danger{background:var(--danger);color:white;}
.btn.warning{background:var(--warning);color:white;}
.btn.small{padding:4px 8px;font-size:12px;}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:14px;}
th,td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle;}
thead th{position:sticky;top:0;background:var(--surface);color:var(--muted);text-align:left;z-index:10;}
thead th:first-child{left:0;z-index:11;box-shadow:2px 0 4px rgba(0,0,0,0.05);}
tbody tr:nth-child(even){background:color-mix(in oklab,var(--surface) 90%,var(--text) 2%);}
tbody tr:hover{background:color-mix(in oklab,var(--surface) 85%,var(--accent) 5%);}
tbody td:first-child{position:sticky;left:0;background:inherit;font-weight:600;box-shadow:2px 0 4px rgba(0,0,0,0.05);}
.is-best{outline:2px solid var(--good);outline-offset:-2px;border-radius:6px;font-weight:700;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);}
.toast{position:fixed;right:16px;bottom:16px;background:var(--surface);border:1px solid var(--border);padding:10px 14px;border-radius:10px;box-shadow:var(--shadow);animation:slideIn 0.3s;z-index:1000;}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* 已選產品列表樣式 */
.selected-list{list-style:none;padding:0;margin:12px 0;}
.selected-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.selected-item .name{flex:1;font-weight:500;font-size:13px;}
.selected-item .controls{display:flex;gap:4px;}
.move-btn{width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;font-size:16px;}
.delete-btn{background:var(--danger);color:white;}

/* 比較差異樣式 */
.comparison-card{margin-top:16px;padding:12px;background:var(--surface-2);border-radius:12px;border:1px solid var(--border);}
.comparison-card h3{margin:0 0 12px 0;font-size:15px;color:var(--accent);}
.compare-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.compare-row:last-child{border-bottom:none;}
.compare-label{font-weight:600;color:var(--text);}
.compare-value{font-size:16px;font-weight:700;}
.compare-value.positive{color:var(--good);}
.compare-value.negative{color:var(--danger);}
.compare-value.neutral{color:var(--muted);}

/* Modal 樣式 */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center;padding:20px;}
.modal.show{display:flex;}
.modal-content{background:var(--surface);border-radius:var(--radius);max-width:900px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-header h2{margin:0;font-size:20px;}
.modal-body{padding:20px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.close-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;}
.close-btn:hover{background:var(--surface-2);}

/* Form 樣式 */
.form-group{margin-bottom:16px;}
.form-group label{display:block;margin-bottom:6px;font-weight:600;color:var(--text);}
.form-group input,.form-group select{width:100%;box-sizing:border-box;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.form-row{grid-template-columns:1fr;}}

/* 產品管理表格 */
.product-table{font-size:13px;}
.product-table th{background:var(--surface-2);font-weight:600;padding:8px;}
.product-table td{padding:8px;}
.product-table .action-btns{display:flex;gap:4px;}
.search-box{margin-bottom:16px;position:relative;}
.search-box input{padding-right:40px;}
.search-box .search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);}

/* 深色主題 */
:root[data-theme="dark"]{
  --bg:#0b0d10;
  --surface:#151a21;
  --surface-2:#1d2430;
  --text:#e8eef5;
  --muted:#9fb0c3;
  --accent:#2eaadc;
  --good:#44d17a;
  --danger:#ef4444;
  --warning:#f59e0b;
  --border:rgba(255,255,255,.1);
  --shadow:0 6px 18px rgba(0,0,0,.28);
  --radius:16px;
}

html, body, body *:not(svg):not(svg *){
  color: var(--text);
}

@media(max-width:768px){
  table{font-size:12px;}
  th,td{padding:6px;}
  .btn{padding:8px 12px;font-size:13px;}
}
</style>
</head>
<body>
<div class="container">
<header>
<div style="display:flex;align-items:center;gap:8px;">
<h1>Kyleの投影機規格比較</h1>
<div class="sub">v3.1 Pro</div>
</div>
<div class="row">
<select id="langSel">
<option value="zh">中文</option>
<option value="en">English</option>
<option value="ja">日本語</option>
</select>
<button class="btn secondary" id="themeToggle" type="button">🌙 / ☀️</button>
<button class="btn warning" id="manageProductsBtn" type="button">🛠️ 管理產品</button>
<button class="btn" id="addProductBtn" type="button">➕ 新增產品</button>
<button class="btn secondary" id="exportHtmlBtn" type="button">下載完整HTML</button>
<button class="btn secondary" id="exportBtn" type="button">匯出 JSON</button>
<label class="btn secondary">匯入 JSON<input accept="application/json" id="importInput" style="display:none" type="file"></label>
</div>
</header>
<div class="grid">
<aside class="card">
<h2>篩選與選擇</h2>
<div class="content">
<div class="row">
<div style="flex:1"><label>品牌</label><select id="brandSel"><option value="">全部</option></select></div>
<div style="flex:1"><label>技術</label><select id="techSel"><option value="">全部</option></select></div>
</div>
<div class="row" style="margin-top:8px">
<div style="flex:1"><label>解析度</label><select id="resSel"><option value="">全部</option></select></div>
</div>
<hr>
<div class="row">
<select id="modelSel" style="flex:1"></select>
<button class="btn" id="addColBtn">加入</button>
</div>
<hr>
<details>
<summary style="color:var(--muted);cursor:pointer">➕ 自定義尺寸</summary>
<div class="row" style="margin-top:8px">
<input id="cd_name" placeholder="名稱（可留白）" style="flex:1" type="text">
</div>
<div class="row" style="margin-top:8px">
<input id="cd_w" placeholder="寬(mm)" type="number" min="1" style="flex:1">
<input id="cd_d" placeholder="深(mm)" type="number" min="1" style="flex:1">
<input id="cd_h" placeholder="高(mm)" type="number" min="1" style="flex:1">
</div>
<button class="btn secondary" id="cd_add" style="width:100%;margin-top:8px">新增自定義尺寸</button>
</details>
<hr>
<div id="selectedList" style="margin-top:12px;"></div>
<button class="btn secondary" id="clearCols" style="width:100%">清除全部</button>

<!-- 產品比較區塊 -->
<div id="comparisonSection"></div>
</div>
</aside>
<main class="card">
<h2>規格比較表</h2>
<div style="overflow-x:auto;">
<div id="table"></div>
</div>
</main>
</div>
</div>
<div id="toastBox" style="display:none" class="toast"></div>

<!-- 新增/編輯產品 Modal -->
<div id="productModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h2 id="productModalTitle">新增產品</h2>
<button class="close-btn" onclick="closeProductModal()">×</button>
</div>
<div class="modal-body">
<form id="productForm">
<input type="hidden" id="edit_product_id">
<div class="form-row">
<div class="form-group">
<label>品牌 *</label>
<input type="text" id="product_brand" required placeholder="例如: Panasonic">
</div>
<div class="form-group">
<label>型號 *</label>
<input type="text" id="product_model" required placeholder="例如: PT-RQ45K">
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>技術</label>
<select id="product_tech">
<option value="">未指定</option>
<option value="1DLP">1DLP</option>
<option value="3DLP">3DLP</option>
<option value="3LCD">3LCD</option>
<option value="6DLP">6DLP</option>
</select>
</div>
<div class="form-group">
<label>面板尺寸</label>
<input type="text" id="product_panel" placeholder="例如: 1.38&quot;">
</div>
</div>
<div class="form-group">
<label>解析度</label>
<select id="product_resolution" onchange="handleResolutionChange()">
<option value="">未指定</option>
<option value="4K UHD (3840x2160)">4K UHD (3840x2160)</option>
<option value="Native 4K (4096x2160)">Native 4K (4096x2160)</option>
<option value="Native DC 4K (4096x2176)">Native DC 4K (4096x2176)</option>
<option value="4K (3840x2400)">4K (3840x2400)</option>
<option value="WUXGA (1920x1200)">WUXGA (1920x1200)</option>
<option value="WQXGA (2716x1600)">WQXGA (2716x1600)</option>
<option value="custom">➕ 自訂解析度...</option>
</select>
<input type="text" id="product_resolution_custom" placeholder="請輸入自訂解析度" style="margin-top:8px;display:none;">
</div>
<div class="form-row">
<div class="form-group">
<label>亮度 (lm) *</label>
<input type="number" id="product_brightness" required placeholder="例如: 45000">
</div>
<div class="form-group">
<label>功耗 (W) *</label>
<input type="number" id="product_power" required placeholder="例如: 3880">
</div>
</div>
<div class="form-row">
<div class="form-group">
<label>重量 (kg)</label>
<input type="number" step="0.1" id="product_weight" placeholder="例如: 85">
</div>
<div class="form-group">
<label>噪音 (dB)</label>
<input type="number" id="product_noise" placeholder="例如: 52">
</div>
</div>
<div class="form-group">
<label>尺寸 (mm) *</label>
<div class="form-row">
<input type="number" id="product_w" required placeholder="寬 W">
<input type="number" id="product_d" required placeholder="深 D">
<input type="number" id="product_h" required placeholder="高 H">
</div>
</div>
</form>
</div>
<div class="modal-footer">
<button class="btn secondary" onclick="closeProductModal()">取消</button>
<button class="btn" onclick="submitProduct()">儲存</button>
</div>
</div>
</div>

<!-- 管理產品 Modal -->
<div id="manageModal" class="modal">
<div class="modal-content" style="max-width:1200px;">
<div class="modal-header">
<h2>產品管理</h2>
<button class="close-btn" onclick="closeManageModal()">×</button>
</div>
<div class="modal-body">
<div class="search-box">
<input type="text" id="searchProducts" placeholder="搜尋品牌或型號..." onkeyup="filterProducts()">
<span class="search-icon">🔍</span>
</div>
<div style="overflow-x:auto;">
<table class="product-table">
<thead>
<tr>
<th>品牌</th>
<th>型號</th>
<th>技術</th>
<th>解析度</th>
<th>亮度(lm)</th>
<th>功耗(W)</th>
<th>尺寸(mm)</th>
<th style="width:120px;">操作</th>
</tr>
</thead>
<tbody id="productTableBody">
</tbody>
</table>
</div>
</div>
<div class="modal-footer">
<button class="btn secondary" onclick="closeManageModal()">關閉</button>
</div>
</div>
</div>

function populate(){
  const brands = [...new Set(DATA.map(d=>d.brand))].sort();
  const techs = [...new Set(DATA.map(d=>d.tech))].filter(Boolean).sort();
  const ress = [...new Set(DATA.map(d=>d.resolution_class))].filter(Boolean).sort();
  $('#brandSel').innerHTML = '<option value="">全部</option>' + brands.map(b=>`<option>${b}</option>`).join('');
  $('#techSel').innerHTML = '<option value="">全部</option>' + techs.map(t=>`<option>${t}</option>`).join('');
  $('#resSel').innerHTML = '<option value="">全部</option>' + ress.map(r=>`<option>${r}</option>`).join('');
  setCascade();
}

function setCascade(){
  const b = $('#brandSel').value, t = $('#techSel').value, r = $('#resSel').value;
  const filt = DATA.filter(d => (!b || d.brand===b) && (!t || d.tech===t) && (!r || d.resolution_class===r));
  $('#modelSel').innerHTML = filt.map(d=>`<option value="${d.id}">${d.model}</option>`).join('');
}

function render(){
  const ui = (I18N[state.lang] || I18N.zh).ui;
  const th = (I18N[state.lang] || I18N.zh).th;
  const best = (I18N[state.lang] || I18N.zh).best;
  const compare = (I18N[state.lang] || I18N.zh).compare;
  
  renderSelectedList();
  renderComparison(compare);
  
  if(!state.selected.length){
    $('#table').innerHTML = `<p style="color:var(--muted);padding:20px;text-align:center">${state.lang==='en'?'No items selected':state.lang==='ja'?'製品を選択してください':'請選擇產品進行比較'}</p>`;
    return;
  }
  const cols = state.selected.map(id=>DATA.find(d=>d.id===id)).filter(Boolean);
  if(!cols.length) return;

  const vol_col = cols.map(c=>{
    const v = (c.dims_mm.w * c.dims_mm.d * c.dims_mm.h)/1000000;
    return { id:c.id, val:v };
  });
  const bright_col = cols.map(c=>({ id:c.id, val:c.brightness_lm }));
  const power_col = cols.map(c=>({ id:c.id, val:c.power_w }));
  const weight_col = cols.map(c=>({ id:c.id, val:c.weight_kg }));
  const noise_col = cols.map(c=>({ id:c.id, val:c.noise_db }));
  const ratio_col = cols.map(c=>({ 
    id:c.id, 
    val: Number.isFinite(c.brightness_lm) && Number.isFinite(c.power_w) && c.power_w>0 
      ? (c.brightness_lm/c.power_w).toFixed(2) 
      : NaN 
  }));

  const bestVol = vol_col.filter(x=>Number.isFinite(x.val)).sort((a,b)=>a.val-b.val)[0]?.id;
  const bestBright = bright_col.filter(x=>Number.isFinite(x.val)).sort((a,b)=>b.val-a.val)[0]?.id;
  const bestPower = power_col.filter(x=>Number.isFinite(x.val)).sort((a,b)=>a.val-b.val)[0]?.id;
  const bestWeight = weight_col.filter(x=>Number.isFinite(x.val)).sort((a,b)=>a.val-b.val)[0]?.id;
  const bestNoise = noise_col.filter(x=>Number.isFinite(x.val)).sort((a,b)=>a.val-b.val)[0]?.id;
  const bestRatio = ratio_col.filter(x=>Number.isFinite(x.val)).sort((a,b)=>b.val-a.val)[0]?.id;

  const isBest = (id,type)=>{
    if(type==='vol') return id===bestVol;
    if(type==='bright') return id===bestBright;
    if(type==='power') return id===bestPower;
    if(type==='weight') return id===bestWeight;
    if(type==='noise') return id===bestNoise;
    if(type==='ratio') return id===bestRatio;
    return false;
  };

  let html='<table><thead><tr><th>'+th.model+'</th>';
  cols.forEach(c=>html+=`<th>${c.brand}<br><strong>${c.model}</strong></th>`);
  html+='</tr></thead><tbody>';

  const addRow=(label,valFunc,type)=>{
    html+=`<tr><td>${label}</td>`;
    cols.forEach(c=>{
      const val=valFunc(c);
      const cls=isBest(c.id,type)?'is-best':'';
      html+=`<td class="${cls}">${val}</td>`;
    });
    html+='</tr>';
  };

  addRow(th.tech, c=>c.tech||'—');
  addRow(th.panel, c=>c.panel_size||'—');
  addRow(th.res, c=>c.resolution_class||'—');
  addRow(th.bright, c=>Number.isFinite(c.brightness_lm)?c.brightness_lm.toLocaleString():'—', 'bright');
  addRow(th.power, c=>Number.isFinite(c.power_w)?c.power_w.toLocaleString():'—', 'power');
  addRow(th.weight, c=>Number.isFinite(c.weight_kg)?c.weight_kg.toFixed(1):'—', 'weight');
  addRow(th.noise, c=>Number.isFinite(c.noise_db)?c.noise_db:'—', 'noise');
  addRow(th.dims, c=>{
    const {w,d,h}=c.dims_mm;
    return `${w}×${d}×${h}`;
  });
  addRow(th.vol+' (W×D×H÷1000000)', c=>{
    const v=(c.dims_mm.w*c.dims_mm.d*c.dims_mm.h)/1000000;
    return v.toFixed(1);
  }, 'vol');
  addRow(th.ratio+' (lm/W)', c=>{
    const r=Number.isFinite(c.brightness_lm)&&Number.isFinite(c.power_w)&&c.power_w>0
      ?(c.brightness_lm/c.power_w).toFixed(2):'—';
    return r;
  }, 'ratio');

  html+='</tbody></table>';
  $('#table').innerHTML=html;
}

function renderSelectedList(){
  const list = $('#selectedList');
  if(!state.selected.length){
    list.innerHTML = `<p style="color:var(--muted);font-size:13px;text-align:center">${state.lang==='en'?'No products selected':state.lang==='ja'?'選択なし':'尚未選擇產品'}</p>`;
    return;
  }
  
  let html = '<ul class="selected-list">';
  state.selected.forEach((id, idx) => {
    const item = DATA.find(d => d.id === id);
    if(!item) return;
    html += `
      <li class="selected-item">
        <span class="name">${idx+1}. ${item.brand} ${item.model}</span>
        <div class="controls">
          ${idx > 0 ? `<button class="btn small move-btn" onclick="moveProduct(${idx}, -1)" title="${state.lang==='en'?'Move up':state.lang==='ja'?'上へ':'往上移'}">↑</button>` : ''}
          ${idx < state.selected.length - 1 ? `<button class="btn small move-btn" onclick="moveProduct(${idx}, 1)" title="${state.lang==='en'?'Move down':state.lang==='ja'?'下へ':'往下移'}">↓</button>` : ''}
          <button class="btn small delete-btn" onclick="removeProduct(${idx})" title="${state.lang==='en'?'Remove':state.lang==='ja'?'削除':'刪除'}">✕</button>
        </div>
      </li>`;
  });
  html += '</ul>';
  list.innerHTML = html;
}

function renderComparison(compare){
  const section = $('#comparisonSection');
  if(state.selected.length < 2){
    section.innerHTML = '';
    return;
  }
  
  const baseProduct = DATA.find(d => d.id === state.selected[0]);
  if(!baseProduct) return;
  
  const baseVolume = (baseProduct.dims_mm.w * baseProduct.dims_mm.d * baseProduct.dims_mm.h) / 1000000;
  
  let html = `
    <div class="comparison-card">
      <h3>📊 ${compare.title}</h3>
      <div style="margin-bottom:12px;padding:8px;background:var(--surface);border-radius:8px;border:1px solid var(--border);">
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">${compare.baseProduct}:</div>
        <div style="font-weight:700;color:var(--accent);">${baseProduct.brand} ${baseProduct.model}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px;">體積: ${baseVolume.toFixed(1)}L</div>
      </div>
  `;
  
  for(let i = 1; i < state.selected.length; i++){
    const product = DATA.find(d => d.id === state.selected[i]);
    if(!product) continue;
    
    const volume = (product.dims_mm.w * product.dims_mm.d * product.dims_mm.h) / 1000000;
    const ratio = (volume / baseVolume * 100).toFixed(1);
    const isLarger = volume > baseVolume;
    const isSmaller = volume < baseVolume;
    
    html += `
      <div class="compare-row">
        <div style="flex:1;">
          <div style="font-weight:600;font-size:13px;">${product.brand} ${product.model}</div>
          <div style="font-size:12px;color:var(--muted);">${volume.toFixed(1)}L</div>
        </div>
        <div style="text-align:right;">
          <div class="compare-value ${isSmaller ? 'positive' : isLarger ? 'negative' : 'neutral'}" style="font-size:15px;">
            ${ratio}%
          </div>
          <div style="font-size:11px;color:var(--muted);">
            ${compare.ofBase} ${isSmaller ? compare.smaller : isLarger ? compare.larger : '相同'}
          </div>
        </div>
      </div>
    `;
  }
  
  html += `</div>`;
  section.innerHTML = html;
}

function moveProduct(index, direction){
  const newIndex = index + direction;
  if(newIndex < 0 || newIndex >= state.selected.length) return;
  [state.selected[index], state.selected[newIndex]] = [state.selected[newIndex], state.selected[index]];
  render();
}

function removeProduct(index){
  state.selected.splice(index, 1);
  render();
  toast((I18N[state.lang]||I18N.zh).ui.clear);
}

function toast(msg){
  const box = $('#toastBox');
  box.textContent = msg;
  box.style.display = 'block';
  setTimeout(() => box.style.display = 'none', 2000);
}

function addSelected(id){
  if(!id) return;
  if(state.selected.includes(id)){
    toast(state.lang==='en'?'Already added':state.lang==='ja'?'既に追加済み':'已在比較列表中');
    return;
  }
  state.selected.push(id);
  render();
  toast((I18N[state.lang]||I18N.zh).ui.added);
}

function addCustomDims(){
  const name=($('#cd_name')?.value||'').trim();
  const w=Number($('#cd_w')?.value), d=Number($('#cd_d')?.value), h=Number($('#cd_h')?.value);
  if(!Number.isFinite(w)||!Number.isFinite(d)||!Number.isFinite(h)||w<=0||d<=0||h<=0){
    alert(state.lang==='en'?'Invalid dimensions':state.lang==='ja'?'無効な寸法':'請輸入正確的尺寸(W/D/H,單位mm)');
    return;
  }
  const id=`CUSTOM-${Date.now()}`;
  const modelName=name||`${w}x${d}x${h}`;
  const custom = {
    id, brand:'Custom', model:modelName,
    tech:'', resolution_class:'',
    brightness_lm:NaN, power_w:NaN, weight_kg:NaN, noise_db:NaN,
    dims_mm:{w,d,h}
  };
  DATA.push(custom);
  populate();
  $('#modelSel').value=id;
  addSelected(id);
  ['cd_name','cd_w','cd_d','cd_h'].forEach(i=>{const el=$('#'+i);if(el)el.value='';});
}

// === 產品管理功能 ===

function openManageModal(){
  $('#manageModal').classList.add('show');
  renderProductTable();
}

function closeManageModal(){
  $('#manageModal').classList.remove('show');
}

function renderProductTable(){
  const tbody = $('#productTableBody');
  const searchTerm = ($('#searchProducts')?.value || '').toLowerCase();
  
  let filtered = DATA.filter(d => {
    if(!searchTerm) return true;
    return d.brand.toLowerCase().includes(searchTerm) || 
           d.model.toLowerCase().includes(searchTerm);
  });
  
  filtered.sort((a,b) => {
    if(a.brand !== b.brand) return a.brand.localeCompare(b.brand);
    return a.model.localeCompare(b.model);
  });
  
  let html = '';
  filtered.forEach(p => {
    html += `
      <tr>
        <td>${p.brand}</td>
        <td>${p.model}</td>
        <td>${p.tech || '—'}</td>
        <td style="font-size:12px;">${p.resolution_class || '—'}</td>
        <td>${p.brightness_lm.toLocaleString()}</td>
        <td>${p.power_w.toLocaleString()}</td>
        <td style="font-size:12px;">${p.dims_mm.w}×${p.dims_mm.d}×${p.dims_mm.h}</td>
        <td>
          <div class="action-btns">
            <button class="btn small secondary" onclick="editProduct('${p.id}')">✏️</button>
            <button class="btn small danger" onclick="deleteProduct('${p.id}')">🗑️</button>
          </div>
        </td>
      </tr>
    `;
  });
  
  tbody.innerHTML = html || '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:20px;">沒有找到產品</td></tr>';
}

function filterProducts(){
  renderProductTable();
}

function editProduct(id){
  const product = DATA.find(d => d.id === id);
  if(!product) return;
  
  state.editingProductId = id;
  $('#productModalTitle').textContent = state.lang==='en'?'Edit Product':state.lang==='ja'?'製品編集':'編輯產品';
  
  $('#edit_product_id').value = id;
  $('#product_brand').value = product.brand;
  $('#product_model').value = product.model;
  $('#product_tech').value = product.tech || '';
  $('#product_panel').value = product.panel_size || '';
  
  // 檢查是否為預設解析度
  const resolutionOptions = ['4K UHD (3840x2160)', 'Native 4K (4096x2160)', 'Native DC 4K (4096x2176)', '4K (3840x2400)', 'WUXGA (1920x1200)', 'WQXGA (2716x1600)'];
  if(resolutionOptions.includes(product.resolution_class)){
    $('#product_resolution').value = product.resolution_class;
    $('#product_resolution_custom').style.display = 'none';
  } else {
    $('#product_resolution').value = 'custom';
    $('#product_resolution_custom').value = product.resolution_class || '';
    $('#product_resolution_custom').style.display = 'block';
  }
  
  $('#product_brightness').value = product.brightness_lm;
  $('#product_power').value = product.power_w;
  $('#product_weight').value = product.weight_kg || '';
  $('#product_noise').value = product.noise_db || '';
  $('#product_w').value = product.dims_mm.w;
  $('#product_d').value = product.dims_mm.d;
  $('#product_h').value = product.dims_mm.h;
  
  closeManageModal();
  $('#productModal').classList.add('show');
}

function deleteProduct(id){
  const product = DATA.find(d => d.id === id);
  if(!product) return;
  
  const ui = (I18N[state.lang] || I18N.zh).ui;
  if(!confirm(ui.confirmDelete)) return;
  
  DATA = DATA.filter(d => d.id !== id);
  state.selected = state.selected.filter(sid => sid !== id);
  
  populate();
  render();
  renderProductTable();
  toast(ui.productDeleted);
}

function openProductModal(){
  state.editingProductId = null;
  $('#productModalTitle').textContent = state.lang==='en'?'Add Product':state.lang==='ja'?'製品追加':'新增產品';
  $('#edit_product_id').value = '';
  $('#productForm').reset();
  $('#product_resolution_custom').style.display = 'none';
  $('#productModal').classList.add('show');
}

function closeProductModal(){
  $('#productModal').classList.remove('show');
  $('#productForm').reset();
  $('#product_resolution_custom').style.display = 'none';
  state.editingProductId = null;
}

function handleResolutionChange(){
  const select = $('#product_resolution');
  const customInput = $('#product_resolution_custom');
  if(select.value === 'custom'){
    customInput.style.display = 'block';
    customInput.focus();
  } else {
    customInput.style.display = 'none';
    customInput.value = '';
  }
}

function submitProduct(){
  const isEditing = !!state.editingProductId;
  const brand = $('#product_brand').value.trim();
  const model = $('#product_model').value.trim();
  const tech = $('#product_tech').value;
  const panel = $('#product_panel').value.trim();
  let resolution = $('#product_resolution').value;
  const customResolution = $('#product_resolution_custom').value.trim();
  const brightness = Number($('#product_brightness').value);
  const power = Number($('#product_power').value);
  const weight = Number($('#product_weight').value);
  const noise = Number($('#product_noise').value);
  const w = Number($('#product_w').value);
  const d = Number($('#product_d').value);
  const h = Number($('#product_h').value);
  
  if(resolution === 'custom'){
    if(!customResolution){
      alert(state.lang==='en'?'Please enter custom resolution':state.lang==='ja'?'カスタム解像度を入力してください':'請輸入自訂解析度');
      return;
    }
    resolution = customResolution;
  }
  
  if(!brand || !model || !brightness || !power || !w || !d || !h){
    alert(state.lang==='en'?'Please fill in all required fields':state.lang==='ja'?'必須項目を入力してください':'請填寫所有必填欄位');
    return;
  }
  
  const productData = {
    brand,
    model,
    tech: tech || '',
    panel_size: panel || null,
    resolution_class: resolution || '',
    brightness_lm: brightness,
    power_w: power,
    weight_kg: weight || NaN,
    noise_db: noise || NaN,
    dims_mm: {w, d, h}
  };
  
  if(isEditing){
    // 編輯現有產品
    const index = DATA.findIndex(d => d.id === state.editingProductId);
    if(index !== -1){
      DATA[index] = { ...DATA[index], ...productData };
    }
    toast((I18N[state.lang]||I18N.zh).ui.productUpdated);
  } else {
    // 新增產品
    const id = `${brand}-${model}-${Date.now()}`;
    DATA.push({ id, ...productData });
    toast((I18N[state.lang]||I18N.zh).ui.productAdded);
    
    // 自動選擇新產品
    setTimeout(() => {
      $('#modelSel').value = id;
      addSelected(id);
    }, 100);
  }
  
  populate();
  render();
  closeProductModal();
}

// === 匯入匯出功能 ===

function importJSON(file){
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const arr = JSON.parse(e.target.result);
      if(!Array.isArray(arr)) throw new Error('Invalid format');
      
      const normalized = arr.map(x => {
        const dims = x.dims_mm && Number.isFinite(x.dims_mm.w) ? x.dims_mm :
                    {w:Number(x.w_mm??x.w), d:Number(x.d_mm??x.d), h:Number(x.h_mm??x.h)};
        return {
          id: x.id || `${x.brand||'X'}-${x.model||'Y'}-${Math.random().toString(36).slice(2,6)}`,
          brand: x.brand ?? '—',
          model: x.model ?? '—',
          tech: x.tech ?? '',
          panel_size: (x.panel_size ?? x.panel_inch ?? x.panel ?? x.dmd ?? x.lcd_panel) ?? null,
          resolution_class: x.resolution_class ?? '',
          brightness_lm: Number(x.brightness_lm),
          power_w: Number(x.power_w),
          weight_kg: Number(x.weight_kg),
          noise_db: Number(x.noise_db),
          dims_mm: dims
        };
      }).filter(x => x.dims_mm && Number.isFinite(x.dims_mm.w) && Number.isFinite(x.dims_mm.d) && Number.isFinite(x.dims_mm.h));
      
      if(!normalized.length) throw new Error('No valid data');
      
      // 修正:完全覆蓋而非合併
      DATA = normalized;
      state.selected = [];
      
      populate();
      render();
      toast((I18N[state.lang]||I18N.zh).ui.imported);
    } catch(err){
      alert((state.lang==='en'?'Import failed: ':state.lang==='ja'?'インポート失敗: ':'匯入失敗:') + err.message);
    }
  };
  reader.readAsText(file);
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'projectors.json';
  a.click();
}

function exportHTML(){
  const serialized = JSON.stringify(DATA, null, 2);
  let html = document.documentElement.outerHTML;
  html = html.replace(/\sdata-theme=(["'])(?:light|dark)\1/gi, '');
  html = html.replace(
    /(let|var|const)\s+DATA\s*=\s*\[[\s\S]*?\];/,
    `let DATA = ${serialized};`
  );
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'projector_comparator_v3.1.html';
  a.click();
}

function initTheme(){
  const root = document.documentElement;
  if(!root.dataset.theme){
    root.dataset.theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
}

function init(){
  initTheme();
  populate();
  render();
  
  $('#addColBtn').onclick = () => addSelected($('#modelSel').value);
  $('#clearCols').onclick = () => {
    state.selected = [];
    render();
    toast((I18N[state.lang]||I18N.zh).ui.clear);
  };
  $('#cd_add').onclick = addCustomDims;
  $('#addProductBtn').onclick = openProductModal;
  $('#manageProductsBtn').onclick = openManageModal;
  $('#importInput').onchange = e => {
    const f = e.target.files?.[0];
    if(f) importJSON(f);
    e.target.value = '';
  };
  $('#exportBtn').onclick = exportJSON;
  $('#exportHtmlBtn').onclick = exportHTML;
  $('#themeToggle').onclick = () => {
    const root = document.documentElement;
    root.dataset.theme = root.dataset.theme === 'light' ? 'dark' : 'light';
    void root.offsetWidth;
  };
  ['brandSel', 'techSel', 'resSel'].forEach(id => $('#'+id).onchange = setCascade);
  $('#langSel').onchange = e => {
    state.lang = e.target.value;
    render();
  };
  
  // Close modals when clicking outside
  $('#productModal').onclick = e => {
    if(e.target.id === 'productModal') closeProductModal();
  };
  $('#manageModal').onclick = e => {
    if(e.target.id === 'manageModal') closeManageModal();
  };
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body></html>
